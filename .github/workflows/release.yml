name: Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-core:
    name: Build verified core artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 70
    outputs:
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package and Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m playwright install --with-deps chromium

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Run complete release gate
        env:
          MARDAS_RENDER_SMOKE: '1'
          MARDAS_RELEASE_VISUAL_QA: '1'
        run: ./scripts/release_gate.sh

      - name: Assemble core release directory
        shell: bash
        run: |
          rm -rf build/release-core
          mkdir -p build/release-core
          cp dist/*.whl dist/*.tar.gz dist/*.spdx.json build/release-core/
          cp examples/GUIDE.en.pdf examples/GUIDE.fa.pdf build/release-core/
          python scripts/finalize_release_artifacts.py \
            --artifact-dir build/release-core \
            --version "${{ steps.metadata.outputs.version }}" \
            --source-revision "$GITHUB_SHA" \
            --require-sbom

      - name: Upload core release files
        uses: actions/upload-artifact@v7
        with:
          name: release-core
          path: build/release-core/
          if-no-files-found: error
          retention-days: 30

  offline-bundles:
    name: Offline Python bundle / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: build-core
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip

      - name: Download core artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-core
          path: build/release-core

      - name: Build offline wheel bundle
        run: |
          python scripts/build_offline_bundle.py --wheel-dir build/release-core --output-dir build/offline --platform-label "${{ runner.os }}-${{ runner.arch }}"

      - name: Upload offline bundle
        uses: actions/upload-artifact@v7
        with:
          name: offline-${{ runner.os }}-${{ runner.arch }}
          path: build/offline/*.zip
          if-no-files-found: error
          retention-days: 30

  attest:
    name: Finalize and attest release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-core, offline-bundles]
    if: github.repository == 'mragetsars/Mardas-MD2PDF'
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install release tooling dependencies
        run: python -m pip install --upgrade packaging

      - name: Download core artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-core
          path: build/release

      - name: Download offline bundles
        uses: actions/download-artifact@v8
        with:
          pattern: offline-*
          path: build/offline
          merge-multiple: true

      - name: Finalize release manifest and checksums
        shell: bash
        run: |
          cp build/offline/*.zip build/release/
          python scripts/finalize_release_artifacts.py \
            --artifact-dir build/release \
            --version "${{ needs.build-core.outputs.version }}" \
            --source-revision "$GITHUB_SHA" \
            --require-sbom \
            --minimum-bundle-count 3
          python - <<'PY'
          from pathlib import Path
          source = Path("build/release/CHECKSUMS.sha256")
          selected = []
          for line in source.read_text(encoding="utf-8").splitlines():
              if not line:
                  continue
              name = line.split("  ", 1)[1]
              if name.endswith(".spdx.json") or name == "RELEASE-MANIFEST.json":
                  continue
              selected.append(line)
          Path("build/attestation-subjects.sha256").write_text(
              "\n".join(selected) + "\n", encoding="utf-8", newline="\n"
          )
          PY

      - name: Resolve SBOM path
        id: paths
        shell: bash
        run: |
          sbom="$(find build/release -maxdepth 1 -type f -name '*.spdx.json' -print -quit)"
          test -n "$sbom"
          echo "sbom=$sbom" >> "$GITHUB_OUTPUT"

      - name: Attest SLSA build provenance
        id: provenance
        uses: actions/attest@v4
        with:
          subject-checksums: build/attestation-subjects.sha256

      - name: Attest SPDX SBOM
        id: sbom
        uses: actions/attest@v4
        with:
          subject-checksums: build/attestation-subjects.sha256
          sbom-path: ${{ steps.paths.outputs.sbom }}

      - name: Preserve signed attestation bundles
        shell: bash
        run: |
          mkdir -p build/attestations
          cp "${{ steps.provenance.outputs.bundle-path }}" build/attestations/provenance.sigstore.json
          cp "${{ steps.sbom.outputs.bundle-path }}" build/attestations/sbom.sigstore.json
          (
            cd build/attestations
            sha256sum provenance.sigstore.json sbom.sigstore.json > CHECKSUMS.sha256
          )

      - name: Upload final release package
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.build-core.outputs.version }}
          path: build/release/
          if-no-files-found: error
          retention-days: 90

      - name: Upload signed attestation bundles
        uses: actions/upload-artifact@v7
        with:
          name: release-attestations-${{ needs.build-core.outputs.version }}
          path: build/attestations/
          if-no-files-found: error
          retention-days: 90
