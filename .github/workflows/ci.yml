name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-tests:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: ubuntu-latest
            python-version: '3.13'
          - os: windows-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.13'
          - os: macos-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.13'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: python -m ruff check .

      - name: Run tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
          MARDAS_RENDER_SMOKE: '0'
        run: python -m pytest -q

      - name: Run CLI path smoke
        run: |
          python -m mardas_md2pdf.cli --version
          python -m mardas_md2pdf.cli --list-styles

  platform-wheel-smoke:
    name: Wheel render smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    needs: core-tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip

      - name: Build and install wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --wheel
          python -c "import glob,subprocess,sys; wheels=glob.glob('dist/*.whl'); assert len(wheels)==1; subprocess.check_call([sys.executable,'-m','pip','install','--force-reinstall',wheels[0]])"

      - name: Install Chromium dependencies
        if: runner.os == 'Linux'
        run: python -m playwright install --with-deps chromium

      - name: Install Chromium
        if: runner.os != 'Linux'
        run: python -m playwright install chromium

      - name: Render Unicode-path smoke PDF
        run: python scripts/cross_platform_smoke.py --output build/platform-smoke/${{ runner.os }}.pdf

      - name: Upload platform smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: platform-smoke-${{ runner.os }}-${{ runner.arch }}
          path: build/platform-smoke/
          if-no-files-found: error

  visual-qa:
    name: Visual QA artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: platform-wheel-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package, Chromium, and PDF rasterizer
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m playwright install --with-deps chromium

      - name: Build appearance visual artifacts
        run: |
          python scripts/audit_appearance_matrix.py \
            --output-dir build/visual-qa/appearance \
            --styles modern \
            --palettes blue \
            --modes light,dark \
            --render-png \
            --png-dpi 48 \
            --timeout 90 \
            --raster-timeout 60 \
            --fail-fast \
            --clean

      - name: Build feature visual artifacts
        run: |
          python scripts/audit_pdf_features.py \
            --output-dir build/visual-qa/features \
            --appearances modern:blue:light,modern:blue:dark \
            --render-png \
            --png-dpi 48 \
            --timeout 90 \
            --raster-timeout 60 \
            --fail-fast \
            --clean

      - name: Capture Studio visual artifact
        run: |
          python scripts/audit_studio_visual.py \
            --output-dir build/visual-qa/studio \
            --timeout 30 \
            --clean

      - name: Upload visual QA artifacts
        uses: actions/upload-artifact@v7
        with:
          name: visual-qa-${{ github.sha }}
          path: build/visual-qa/
          if-no-files-found: error
