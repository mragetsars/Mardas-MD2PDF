name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

  render-smoke:
    name: Render smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package and Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m playwright install --with-deps chromium

      - name: Render guide sample
        run: |
          mrs-md2pdf GUIDE.en.md -o /tmp/GUIDE.en.pdf --toc --profile github --timeout-ms 180000
          test -s /tmp/GUIDE.en.pdf
