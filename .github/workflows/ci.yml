name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run quality gates
        run: ./scripts/check.sh

  render-smoke:
    name: Render smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package and Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m playwright install --with-deps chromium

      - name: Render guide sample
        run: |
          mrs-md2pdf docs/guides/GUIDE.en.md -o /tmp/GUIDE.en.pdf --toc --style github --palette blue --mode light --timeout-ms 180000
          test -s /tmp/GUIDE.en.pdf

  visual-qa:
    name: Visual QA artifacts
    runs-on: ubuntu-latest
    needs: render-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package, Chromium, and PDF rasterizer
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m playwright install --with-deps chromium

      - name: Build appearance visual artifacts
        run: |
          python scripts/audit_appearance_matrix.py \
            --output-dir build/visual-qa/appearance \
            --styles modern \
            --palettes blue \
            --modes light,dark \
            --render-png \
            --png-dpi 48 \
            --timeout 90 \
            --clean

      - name: Build feature visual artifacts
        run: |
          python scripts/audit_pdf_features.py \
            --output-dir build/visual-qa/features \
            --appearances modern:blue:light,modern:blue:dark \
            --render-png \
            --png-dpi 48 \
            --timeout 90 \
            --clean

      - name: Capture Studio visual artifact
        run: |
          python scripts/audit_studio_visual.py \
            --output-dir build/visual-qa/studio \
            --timeout 30 \
            --clean

      - name: Upload visual QA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-${{ github.sha }}
          path: build/visual-qa/
          if-no-files-found: error
