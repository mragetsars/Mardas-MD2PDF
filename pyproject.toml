[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "mardas-md2pdf"
version = "0.5.0"
description = "Beautiful Persian/English Markdown to PDF converter with RTL/LTR typography, hierarchical TOC, code highlighting, tables, and MathJax."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
  { name = "Mardas MD2PDF" }
]
keywords = ["markdown", "pdf", "rtl", "persian", "mathjax", "pygments", "playwright"]
dependencies = [
  "markdown-it-py>=3.0.0",
  "pygments>=2.17.0",
  "beautifulsoup4>=4.12.0",
  "playwright>=1.45.0",
  "PyYAML>=6.0.0",
  "pypdf>=4.0.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "ruff>=0.5.0"
]

[project.scripts]
mrs-md2pdf = "mardas_md2pdf.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/mardas_md2pdf"]
include = [
  "src/mardas_md2pdf/assets/**/*.css",
  "src/mardas_md2pdf/assets/**/*.js",
  "src/mardas_md2pdf/assets/**/*.png",
  "src/mardas_md2pdf/assets/mathjax/*"
]

[tool.ruff]
line-length = 100
src = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
